<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud File Upload</title>
    <style>
       /* Reset + base */
body {
    font-family: "Segoe UI", Tahoma, sans-serif;
    background-color: #f5f7fa;
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card container */
.card {
    background: #ffffff;
    padding: 32px;
    width: 420px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);

    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Heading */
h1 {
    font-size: 22px;
    margin: 0;
    color: #2d3748;
}

/* Subtitle */
p {
    font-size: 14px;
    color: #718096;
    margin: 0;
}

/* Form layout */
.form-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* File input box */
.file-input {
    border: 1.5px dashed #cbd5e0;
    padding: 25px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.file-input:hover {
    background-color: #f7fafc;
    border-color: #a0aec0;
}

/* Hide actual file input */
input[type="file"] {
    display: none;
}

/* File name text */
#fileName {
    font-size: 13px;
    color: #4a5568;
}

/* Upload button */
button {
    width: 100%;
    padding: 12px;
    background-color: #2b6cb0;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    background-color: #2c5282;
}

/* Status text */
#status {
    font-size: 13px;
    margin-top: 5px;
}

/* Success + error states */
.success {
    color: #2f855a;
}

.error {
    color: #c53030;
}
    </style>
</head>
<body>

<div class="card">
    <h1>Upload File</h1>
    <p>Select a file(PNG, JPG, PDF, max 2MB) to upload to cloud storage</p>

    <form id="uploadForm" class="form-group">

        <label class="file-input">
            Click to select file
            <input type="file" id="fileInput" name="file" required>
        </label>

        <div id="fileName"></div>

        <button type="submit" id="uploadBtn">Upload</button>

    </form>

    <div id="status"></div>
</div>

<script>
    const form = document.getElementById("uploadForm");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const status = document.getElementById("status");

    fileInput.addEventListener("change", () => {
        fileName.textContent = fileInput.files[0]?.name || "";
    });

    const uploadBtn = document.getElementById("uploadBtn");
    function copyLink(url) {
    navigator.clipboard.writeText(url);
    alert("Link copied!");
}
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(form);

    status.textContent = "Uploading...";
    status.className = "";

    uploadBtn.disabled = true;
    uploadBtn.textContent = "Uploading...";

    try {
        const response = await fetch(`http://localhost:${process.env.PORT}/upload`, {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (!response.ok) {
            status.innerText = result.error;
            status.className = "error";
            return;
        }

        status.innerHTML = `
            Upload successful! <br/>
            <a href="${result.fileUrl}" target="_blank">Open/Download File</a><br/><br/>
            <button onclick="copyLink('${result.fileUrl}')">Copy Link</button>
        `;
        status.className = "success";

        form.reset();
        fileName.textContent = "";

    } catch (err) {
        status.innerText = "Upload Failed!";
        status.className = "error";
    } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "Upload";
    }
});
</script>

</body>
</html>
